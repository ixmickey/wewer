
<script src="https://cdn.tailwindcss.com"></script>
<div class="min-h-screen bg-gray-100 flex items-center justify-center">
<div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-lg">
<h2 class="text-xl font-bold mb-6 text-center">Submit Request</h2>
<form method="POST" class="space-y-4">
<input name="contact" class="w-full border p-3 rounded-lg" placeholder="Email or Phone">
<input name="order" class="w-full border p-3 rounded-lg" placeholder="Order ID">
<input name="payment" class="w-full border p-3 rounded-lg" placeholder="Payment Reference">
<input name="product" class="w-full border p-3 rounded-lg" placeholder="Product Link">
<input name="count" class="w-full border p-3 rounded-lg" placeholder="Request Count">
<button class="w-full bg-indigo-600 text-white p-3 rounded-lg">Submit Request</button>
</form>
</div>
</div>
